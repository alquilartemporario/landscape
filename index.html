<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Color Pong Arena - Mobile</title>

<style>
body{
    margin:0;
    background:#0f172a;
    overflow:hidden;
    font-family:Arial;
}

/* FULLSCREEN CANVAS */
canvas{
    display:block;
    width:100vw;
    height:100vh;
    background:#020617;
}

/* MENU */
#menu{
    position:absolute;
    width:100%;
    height:100%;
    background:#020617;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    gap:20px;
    z-index:10;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    cursor:pointer;
    border-radius:10px;
}

.easy{background:#22c55e;}
.normal{background:#eab308;}
.hard{background:#ef4444;}
</style>
</head>

<body>

<div id="menu">
    <h1>COLOR PONG</h1>
    <h3>Selecciona dificultad</h3>

    <button class="easy" onclick="startGame(0.25)">FÁCIL (25%)</button>
    <button class="normal" onclick="startGame(0.5)">NORMAL (50%)</button>
    <button class="hard" onclick="startGame(1)">PRO (100%)</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* FULLSCREEN + LANDSCAPE */
function goFull(){
    let el = document.documentElement;
    if(el.requestFullscreen){
        el.requestFullscreen().catch(()=>{});
    }
    if(screen.orientation && screen.orientation.lock){
        screen.orientation.lock("landscape").catch(()=>{});
    }
}

/* COLORES */
const colores = ["red","yellow","blue","lime"];
function randomColor(){
    return colores[Math.floor(Math.random()*colores.length)];
}

/* AUDIO */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let musicStarted = false;

const notes = { C:261, D:294, E:329, G:392, A:440 };

const melody = ["A","G","E","D","C","D","E","G","E","D","C","A"];

function play(freq, duration=0.6, vol=0.015){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    gain.gain.value = vol;

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

/* PLAYERS */
function createPlayer(x){
    return {
        x,
        y:canvas.height/2-60,
        w:20,
        h:120,
        color:"white"
    }
}

let p1, p2, ball;
let score = 0;
let gameOver = false;
let obstacle = null;
let obstacleHP = 0;
let speedMultiplier = 1;

const keys = {};

/* START */
function startGame(diff){

    goFull();

    speedMultiplier = diff;
    document.getElementById("menu").style.display = "none";

    p1 = createPlayer(canvas.width * 0.15);
    p2 = createPlayer(canvas.width * 0.85);

    ball = {
        x:canvas.width/2,
        y:canvas.height/2,
        dx:16 * speedMultiplier,
        dy:5 * speedMultiplier,
        speed:1,
        color:randomColor()
    };

    score = 0;
    gameOver = false;
    obstacle = null;

    if(!musicStarted){
        startMusic();
        musicStarted = true;
    }
}

/* MUSIC */
function startMusic(){
    setInterval(()=>{
        play(notes[melody[Math.floor(Math.random()*melody.length)]],0.6,0.015);
    }, 700);
}

/* INPUT KEYBOARD (opcional) */
document.addEventListener("keydown", e=>{
    keys[e.key] = true;

    if(e.key==="q") p1.color="red";
    if(e.key==="e") p1.color="yellow";
    if(e.key==="a") p1.color="blue";
    if(e.key==="d") p1.color="lime";

    if(e.key==="7") p2.color="red";
    if(e.key==="9") p2.color="yellow";
    if(e.key==="4") p2.color="blue";
    if(e.key==="6") p2.color="lime";

    if(e.key===" "){
        breakObstacle();
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

/* TOUCH SYSTEM */
let touchStart = null;

canvas.addEventListener("touchstart", e=>{
    const t = e.touches[0];
    touchStart = {x:t.clientX, y:t.clientY};
});

canvas.addEventListener("touchend", e=>{
    if(!touchStart) return;

    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;

    const moved = Math.abs(dy) > 20;

    const x = touchStart.x;
    const y = touchStart.y;

    /* LEFT SIDE = P1 */
    if(x < canvas.width/2){
        if(moved){
            p1.y += dy;
        }else{
            cycleColor(p1);
        }
    }
    /* RIGHT SIDE = P2 */
    else{
        if(moved){
            p2.y += dy;
        }else{
            cycleColor(p2);
        }
    }

    /* OBSTACLE TAP */
    if(obstacle &&
       x > obstacle.x &&
       x < obstacle.x + obstacle.w &&
       y > obstacle.y &&
       y < obstacle.y + obstacle.h){
        breakObstacle();
    }

    touchStart = null;
});

function cycleColor(p){
    const i = colores.indexOf(p.color);
    p.color = colores[(i+1)%colores.length];
}

/* DRAW */
function drawPlayer(p){
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x,p.y,p.w,p.h);
}

function drawBall(){
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,20,0,Math.PI*2);
    ctx.fillStyle = ball.color;
    ctx.fill();
}

function drawScore(){
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText(score, canvas.width/2,40);
}

function drawObstacle(){
    if(!obstacle) return;

    ctx.fillStyle = "#ff4fd8";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

    ctx.fillStyle = "black";
    ctx.font = "30px Arial";
    ctx.fillText(obstacleHP, obstacle.x + 20, obstacle.y + 80);
}

/* UPDATE */
function update(){

    if(gameOver || !ball) return;

    ball.x += ball.dx * ball.speed;
    ball.y += ball.dy * ball.speed;

    if(ball.y < 0 || ball.y > canvas.height){
        ball.dy *= -1;
    }

    function hit(player, side){

        if(player.color !== ball.color){
            gameOver = true;
            return;
        }

        let relative = (ball.y - (player.y + player.h/2)) / (player.h/2);

        ball.dy = relative * 7;
        ball.dx = side * Math.abs(ball.dx);

        ball.speed *= 1.02;
        score++;

        ball.color = randomColor();

        if(score % 10 === 0){
            spawnObstacle();
        }

        play(500);
    }

    if(ball.x < p1.x + p1.w &&
       ball.y > p1.y &&
       ball.y < p1.y + p1.h){
        hit(p1, 1);
    }

    if(ball.x > p2.x &&
       ball.y > p2.y &&
       ball.y < p2.y + p2.h){
        hit(p2, -1);
    }

    if(obstacle){
        if(ball.x > obstacle.x &&
           ball.x < obstacle.x + obstacle.w &&
           ball.y > obstacle.y &&
           ball.y < obstacle.y + obstacle.h){
            ball.dx *= -1;
        }
    }
}

/* OBSTACLE */
function spawnObstacle(){
    obstacle = {
        x:canvas.width/2 - 40,
        y:canvas.height/2 - 80,
        w:80,
        h:160
    };
    obstacleHP = Math.max(1, Math.floor(score/10));
}

function breakObstacle(){
    if(!obstacle) return;
    obstacleHP--;
    if(obstacleHP <= 0) obstacle = null;
}

/* LOOP */
function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(p1 && p2 && ball){
        drawPlayer(p1);
        drawPlayer(p2);
        drawBall();
        drawScore();
        drawObstacle();
    }

    update();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
