<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Drone Simulator Mobile</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#0b1020;
    touch-action:none;
}

canvas{
    display:block;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// =====================
// DRONE
// =====================
const drone = {
    x: canvas.width/2,
    y: canvas.height - 120,
    vy: 0,
    vx: 0,
    width: 60,
    height: 20,
    rot: 0
};

// =====================
// INPUT TOUCH
// =====================
let leftPressed = false;
let rightPressed = false;

// dividir pantalla
function handleTouch(e, isDown){
    e.preventDefault();

    leftPressed = false;
    rightPressed = false;

    for(let touch of e.touches){
        if(touch.clientX < canvas.width/2){
            leftPressed = true;
        } else {
            rightPressed = true;
        }
    }

    if(!isDown && e.touches.length === 0){
        leftPressed = false;
        rightPressed = false;
    }
}

canvas.addEventListener("touchstart", (e)=>handleTouch(e,true));
canvas.addEventListener("touchmove", (e)=>handleTouch(e,true));
canvas.addEventListener("touchend", (e)=>handleTouch(e,false));

// =====================
// FÍSICA
// =====================
const gravity = 0.25;
const liftPower = 0.6;
const hoverDamping = 0.92;

// piso
const groundY = canvas.height - 60;

// =====================
// LOOP
// =====================
function update(){

    let lift = 0;

    // ambos motores = subida fuerte y estable
    if(leftPressed && rightPressed){
        lift = liftPower * 2;
    }
    // solo uno = leve inestabilidad / maniobra
    else if(leftPressed || rightPressed){
        lift = liftPower * 0.9;
    }

    // aplicar fuerzas
    drone.vy += gravity - lift;

    // hover stabilizer (evita caída brusca al soltar)
    if(!leftPressed && !rightPressed){
        drone.vy *= hoverDamping;
    }

    // suavizado lateral (simula estabilidad del drone)
    drone.vx *= 0.95;

    // movimiento
    drone.y += drone.vy;
    drone.x += drone.vx;

    // límite piso
    if(drone.y > groundY){
        drone.y = groundY;
        drone.vy = 0;
    }

    // techo invisible
    if(drone.y < 50){
        drone.y = 50;
        drone.vy = 0;
    }

    // inclinación visual según movimiento
    drone.rot = (drone.vx * 0.05);

    draw();
    requestAnimationFrame(update);
}

// =====================
// DIBUJO
// =====================
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // fondo gradiente
    let grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,"#0b1020");
    grad.addColorStop(1,"#05070f");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // piso
    ctx.fillStyle = "#111827";
    ctx.fillRect(0, groundY, canvas.width, canvas.height-groundY);

    // líneas piso
    ctx.strokeStyle = "#1f2937";
    for(let i=0;i<canvas.width;i+=40){
        ctx.beginPath();
        ctx.moveTo(i, groundY);
        ctx.lineTo(i+20, groundY+20);
        ctx.stroke();
    }

    // DRONE
    ctx.save();
    ctx.translate(drone.x, drone.y);
    ctx.rotate(drone.rot);

    // cuerpo
    ctx.fillStyle = "#e5e7eb";
    ctx.fillRect(-drone.width/2, -drone.height/2, drone.width, drone.height);

    // hélice izquierda
    ctx.beginPath();
    ctx.arc(-30, -15, 10, 0, Math.PI*2);
    ctx.fillStyle = leftPressed ? "#22c55e" : "#374151";
    ctx.fill();
    ctx.closePath();

    // hélice derecha
    ctx.beginPath();
    ctx.arc(30, -15, 10, 0, Math.PI*2);
    ctx.fillStyle = rightPressed ? "#22c55e" : "#374151";
    ctx.fill();
    ctx.closePath();

    // luces
    ctx.fillStyle = "#60a5fa";
    ctx.fillRect(-5, 0, 10, 4);

    ctx.restore();

    // UI simple
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.font = "14px Arial";
    ctx.fillText("Izquierda: motor 1 | Derecha: motor 2", 20, 30);
}

update();
</script>

</body>
</html>
