<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Drone Tunnel Dynamic PRO</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    touch-action: none;
}
canvas{
    display:block;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// AUDIO
const passSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-complete-or-approved-mission-205.wav");
const boostSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-fast-small-sweep-transition-166.wav");
const loseSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.wav");

boostSound.loop = true;
let audioUnlocked = false;

// unlock audio + fullscreen + gyro permission
function unlockAudio(){
    if(audioUnlocked) return;
    audioUnlocked = true;

    passSound.play().then(()=>passSound.pause()).catch(()=>{});
    boostSound.play().then(()=>boostSound.pause()).catch(()=>{});
    loseSound.play().then(()=>loseSound.pause()).catch(()=>{});

    // fullscreen mobile
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(()=>{});
    }

    // iOS gyro permission
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission().catch(()=>{});
    }
}

let gameX, gameY, gameWidth, gameHeight;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    gameWidth = canvas.width * 0.6;
    gameHeight = canvas.height * 0.7;

    gameX = (canvas.width - gameWidth)/2;
    gameY = (canvas.height - gameHeight)/2;
}
window.addEventListener("resize", resize);
resize();

// INPUT teclado
const keys = {};
document.addEventListener("keydown", e=>{
    keys[e.key]=true;
    unlockAudio();
});
document.addEventListener("keyup", e=>{
    keys[e.key]=false;
});

// 🎮 GIROSCOPIO
let gyroX = 0; // izquierda/derecha
let gyroY = 0; // adelante/atrás

window.addEventListener("deviceorientation", (e)=>{
    // gamma = izquierda/derecha
    gyroX = e.gamma || 0;

    // beta = adelante/atrás
    gyroY = e.beta || 0;
});

// ESTADO
let started = false;
let gameOver = false;
let score = 0;
let speedMultiplier = 1;
let backgroundIndex = 0;

let flash = 0;
let greenFlash = 0;
let hitFlash = 0;

let boostUsedThisPlanet = false;

// DRONE
let drone = {};

function resetDrone(){
    drone = {
        x: gameX + gameWidth/2,
        y: gameY + gameHeight*0.7,
        vx: 0,
        vy: 0,
        angle: 0,
        angularVel: 0
    };
}

// CONFIG
const gravity = 0.25;
const thrustPower = 0.5;
const tiltPower = 0.0012;
const angularFriction = 0.90;
const maxTilt = 0.05;
const friction = 0.99;

// 🌌 BACKGROUND
const backgrounds = ["black","#020617","#0f172a","#020617","#111827"];

let stars = [];
for(let i=0;i<150;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        depth: Math.random(),
    });
}

// 🪐 PLANET
let planet = null;

function randomColor(){
    const colors = ["#6366f1","#22c55e","#f59e0b","#ef4444","#06b6d4","#a855f7"];
    return colors[Math.floor(Math.random()*colors.length)];
}

function spawnPlanet(){
    planet = {
        t: 0,
        baseSpeed: 0.004 + speedMultiplier*0.0008,
        offsetX: (Math.random()-0.5) * gameWidth * 0.3,
        holeOffset: (Math.random()-0.5) * gameHeight * 0.2,
        color: randomColor()
    };

    boostUsedThisPlanet = false;
}

// UPDATE
function update(){

    if(!started && (keys["w"] || gyroY > 40)){
        started = true;
        score = 0;
        speedMultiplier = 1;
        backgroundIndex = 0;
        resetDrone();
        spawnPlanet();
    }

    if(!started) return;

    if(gameOver){
        hitFlash -= 0.02;
        if(hitFlash <= 0){
            gameOver = false;
            score = 0;
            speedMultiplier = 1;
            backgroundIndex = 0;
            resetDrone();
            spawnPlanet();
        }
        return;
    }

    // 🚀 GIROSCOPIO -> aceleración
    let thrust = (keys["w"] || gyroY > 35) ? thrustPower : 0;

    // 🔄 GIRO con gyro o teclado
    if(keys["a"] || gyroX < -10) drone.angularVel -= tiltPower;
    if(keys["d"] || gyroX > 10) drone.angularVel += tiltPower;

    drone.angularVel = Math.max(-maxTilt, Math.min(maxTilt, drone.angularVel));

    drone.vx += Math.sin(drone.angle) * thrust;
    drone.vy -= Math.cos(drone.angle) * thrust;

    drone.vy += gravity;

    drone.x += drone.vx;
    drone.y += drone.vy;
    drone.angle += drone.angularVel;

    drone.vx *= friction;
    drone.vy *= friction;
    drone.angularVel *= angularFriction;

    if(drone.x < gameX) drone.x = gameX;
    if(drone.x > gameX + gameWidth) drone.x = gameX + gameWidth;

    if(drone.y > gameY + gameHeight){
        collide();
    }

    // estrellas
    stars.forEach(s=>{
        let speed = (0.5 + s.depth * 2) * speedMultiplier;
        s.y += speed;
        if(s.y > canvas.height){
            s.y = 0;
            s.x = Math.random()*canvas.width;
        }
    });

    // planeta
    if(planet){

        let boost = (keys["w"] && !boostUsedThisPlanet) ? 1.8 : 1;

        if(keys["w"] && !boostUsedThisPlanet){
            boostUsedThisPlanet = true;
        }

        planet.t += planet.baseSpeed * boost;

        let ease = planet.t * planet.t;

        planet.radius = 40 + ease * gameWidth;

        planet.x = gameX + gameWidth/2 + planet.offsetX * ease;
        planet.y = gameY + gameHeight/2;

        planet.holeX = planet.x + Math.sin(planet.t * 3) * 30;
        planet.holeY = planet.y + planet.holeOffset * ease;

        planet.hole = (planet.radius * 0.25) * Math.max(0.4, 1 - score * 0.03);

        if(planet.t >= 1){

            let dx = drone.x - planet.holeX;
            let dy = drone.y - planet.holeY;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist > planet.hole){
                collide();
            }else{
                score++;
                speedMultiplier += 0.05;
                greenFlash = 1;

                passSound.currentTime = 0;
                passSound.play().catch(()=>{});

                if(score % 10 === 0){
                    backgroundIndex = (backgroundIndex + 1) % backgrounds.length;
                }
            }

            planet = null;
            setTimeout(spawnPlanet, 200);
        }
    }

    if(greenFlash > 0) greenFlash -= 0.05;
}

function collide(){
    gameOver = true;
    hitFlash = 1;

    loseSound.currentTime = 0;
    loseSound.play().catch(()=>{});

    boostSound.pause();
}

// DRAW (igual)
function drawBackground(){
    ctx.fillStyle = backgrounds[backgroundIndex];
    ctx.fillRect(0,0,canvas.width,canvas.height);

    stars.forEach(s=>{
        let size = 1 + s.depth * 2;
        ctx.fillStyle="white";
        ctx.fillRect(s.x,s.y,size,size);
    });
}

function beginGame(){
    ctx.save();
    ctx.beginPath();
    ctx.rect(gameX, gameY, gameWidth, gameHeight);
    ctx.clip();
}

function endGame(){
    ctx.restore();
}

function drawDrone(){
    ctx.save();
    ctx.translate(drone.x, drone.y);
    ctx.rotate(drone.angle);

    ctx.fillStyle = "#94a3b8";
    ctx.fillRect(-20,-8,40,16);

    ctx.fillStyle = "#38bdf8";
    ctx.beginPath();
    ctx.arc(-35,0,10,0,Math.PI*2);
    ctx.arc(35,0,10,0,Math.PI*2);
    ctx.fill();

    if(keys["w"] || gyroY > 35){
        ctx.fillStyle="orange";
        ctx.fillRect(-40,10,8,15);
        ctx.fillRect(32,10,8,15);
    }

    ctx.restore();
}

function drawPlanet(){
    if(!planet) return;

    ctx.beginPath();
    ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI*2);
    ctx.fillStyle = planet.color;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(planet.holeX, planet.holeY, planet.hole, 0, Math.PI*2);
    ctx.fillStyle = "black";
    ctx.fill();
}

function drawUI(){
    ctx.fillStyle="white";
    ctx.font="20px Arial";

    if(!started){
        ctx.fillText("Inclina el celular o presiona W para empezar", canvas.width/2-160, canvas.height/2);
    }

    ctx.fillText("Puntos: "+score,20,30);

    if(greenFlash > 0){
        ctx.fillStyle="rgba(0,255,0,"+greenFlash+")";
        ctx.fillRect(gameX, gameY, gameWidth, gameHeight);
    }

    if(hitFlash > 0){
        ctx.fillStyle="rgba(255,0,0,"+hitFlash+")";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }
}

// LOOP
function loop(){
    drawBackground();
    beginGame();
    update();
    drawPlanet();
    drawDrone();
    endGame();
    drawUI();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
