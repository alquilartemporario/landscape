<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Drone Tunnel Dynamic PRO Mobile</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    touch-action:none;
    font-family:Arial;
}
canvas{
    display:block;
}

#uiStart{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    background:black;
    z-index:10;
}

button{
    padding:15px 25px;
    font-size:18px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="uiStart">
    <h1>Drone Tunnel PRO</h1>
    <button id="fsBtn">Pantalla completa</button>
    <button id="startBtn">Jugar</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const uiStart = document.getElementById("uiStart");
const fsBtn = document.getElementById("fsBtn");
const startBtn = document.getElementById("startBtn");

// AUDIO
const passSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-complete-or-approved-mission-205.wav");
const loseSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.wav");

let audioUnlocked = false;

function unlockAudio(){
    if(audioUnlocked) return;
    audioUnlocked = true;

    passSound.play().then(()=>passSound.pause()).catch(()=>{});
    loseSound.play().then(()=>loseSound.pause()).catch(()=>{});
}

// FULLSCREEN
function goFullscreen(){
    const el = document.documentElement;
    if(el.requestFullscreen){
        el.requestFullscreen().catch(()=>{});
    }
}

// SIZE
let gameX, gameY, gameWidth, gameHeight;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    gameWidth = canvas.width * 0.6;
    gameHeight = canvas.height * 0.7;

    gameX = (canvas.width - gameWidth)/2;
    gameY = (canvas.height - gameHeight)/2;
}
window.addEventListener("resize", resize);
resize();

// INPUT TOUCH
let leftTouch = false;
let rightTouch = false;

function getSide(x){
    return x < window.innerWidth/2 ? "left" : "right";
}

window.addEventListener("touchstart", e=>{
    unlockAudio();

    for(let t of e.touches){
        let side = getSide(t.clientX);
        if(side === "left") leftTouch = true;
        if(side === "right") rightTouch = true;
    }
});

window.addEventListener("touchend", e=>{
    leftTouch = false;
    rightTouch = false;
});

// STATE
let started = false;
let gameOver = false;
let score = 0;
let speedMultiplier = 1;

let backgrounds = ["#000","#020617","#0f172a","#111827"];
let bgIndex = 0;

// DRONE
let drone;

function resetDrone(){
    drone = {
        x: canvas.width/2,
        y: canvas.height*0.7,
        vx:0,
        vy:0,
        angle:0,
        angularVel:0
    };
}

// PLANET
let planet = null;

function spawnPlanet(){
    planet = {
        t:0,
        baseSpeed:0.004 + speedMultiplier*0.0008,
        offsetX:(Math.random()-0.5)*gameWidth*0.3,
        holeOffset:(Math.random()-0.5)*gameHeight*0.2,
        color:["#6366f1","#22c55e","#f59e0b","#ef4444"][Math.floor(Math.random()*4)]
    };
}

// START GAME
startBtn.onclick = ()=>{
    started = true;
    gameOver = false;
    score = 0;
    speedMultiplier = 1;
    bgIndex = 0;

    resetDrone();
    spawnPlanet();

    uiStart.style.display = "none";
};

fsBtn.onclick = ()=>{
    goFullscreen();
};

// PHYSICS
const gravity = 0.25;
const thrustPower = 0.6;
const turnPower = 0.04;
const friction = 0.98;

// UPDATE
function update(){

    if(!started) return;

    if(gameOver){
        return;
    }

    // ROTATE
    if(leftTouch) drone.angularVel -= turnPower;
    if(rightTouch) drone.angularVel += turnPower;

    // BOOST
    let thrust = (leftTouch && rightTouch) ? thrustPower : 0;

    drone.vx += Math.sin(drone.angle) * thrust;
    drone.vy -= Math.cos(drone.angle) * thrust;

    drone.vy += gravity;

    drone.x += drone.vx;
    drone.y += drone.vy;
    drone.angle += drone.angularVel;

    drone.vx *= friction;
    drone.vy *= friction;
    drone.angularVel *= 0.9;

    // limits
    if(drone.y > canvas.height){
        collide();
    }

    // planet
    if(planet){
        planet.t += planet.baseSpeed;

        let ease = planet.t * planet.t;

        planet.radius = 40 + ease * gameWidth;

        planet.x = canvas.width/2 + planet.offsetX * ease;
        planet.y = canvas.height/2;

        planet.holeX = planet.x;
        planet.holeY = planet.y + planet.holeOffset * ease;

        planet.hole = (planet.radius * 0.25);

        if(planet.t >= 1){
            let dx = drone.x - planet.holeX;
            let dy = drone.y - planet.holeY;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist > planet.hole){
                collide();
            }else{
                score++;
                speedMultiplier += 0.05;

                passSound.currentTime = 0;
                passSound.play().catch(()=>{});
            }

            planet = null;
            setTimeout(spawnPlanet,200);
        }
    }
}

// COLLISION
function collide(){
    gameOver = true;
    loseSound.currentTime = 0;
    loseSound.play().catch(()=>{});

    setTimeout(()=>{
        // RESET TOTAL → vuelve a pantalla inicial
        started = false;
        gameOver = false;
        uiStart.style.display = "flex";
    },1200);
}

// DRAW
function draw(){
    ctx.fillStyle = backgrounds[bgIndex];
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // drone
    ctx.save();
    ctx.translate(drone.x, drone.y);
    ctx.rotate(drone.angle);

    ctx.fillStyle="#94a3b8";
    ctx.fillRect(-20,-8,40,16);

    ctx.restore();

    // planet
    if(planet){
        ctx.beginPath();
        ctx.arc(planet.x,planet.y,planet.radius,0,Math.PI*2);
        ctx.fillStyle=planet.color;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(planet.holeX,planet.holeY,planet.hole,0,Math.PI*2);
        ctx.fillStyle="black";
        ctx.fill();
    }

    // score
    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,20,30);
}

// LOOP
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
