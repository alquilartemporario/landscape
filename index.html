<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Drone Tunnel FIX</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    touch-action:none;
}

canvas{
    display:block;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameX, gameY, gameWidth, gameHeight;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    gameWidth = canvas.width * 0.6;
    gameHeight = canvas.height * 0.7;

    gameX = (canvas.width - gameWidth)/2;
    gameY = (canvas.height - gameHeight)/2;
}
window.addEventListener("resize", resize);
resize();

// ======================
// INPUT
// ======================
let touchLeft = false;
let touchRight = false;
let started = false;

function updateTouches(e){
    touchLeft = false;
    touchRight = false;

    const mid = canvas.width / 2;

    for(let t of e.touches){
        if(t.clientX < mid) touchLeft = true;
        else touchRight = true;
    }

    // 🔥 FIX CLAVE: arranca SIEMPRE con primer touch
    started = true;
}

canvas.addEventListener("touchstart", updateTouches, {passive:false});
canvas.addEventListener("touchmove", updateTouches, {passive:false});
canvas.addEventListener("touchend", updateTouches, {passive:false});

// ======================
// DRONE
// ======================
let drone;

function resetDrone(){
    drone = {
        x: canvas.width/2,
        y: canvas.height*0.7,
        vx: 0,
        vy: 0,
        angle: 0,
        angularVel: 0
    };
}
resetDrone();

// ======================
// PHYSICS (suave)
// ======================
const thrustPower = 0.32;
const tiltPower = 0.0009;
const maxTilt = 0.045;
const gravity = 0.22;
const friction = 0.985;
const angularFriction = 0.92;

// ======================
// LOOP SAFE START
// ======================
function update(){

    if(!drone) resetDrone();

    if(!started){
        // 🔥 evita pantalla negra total
        return;
    }

    let thrust = 0;

    const pressing = touchLeft || touchRight;

    if(pressing){
        thrust = thrustPower;
    }

    if(touchLeft && !touchRight){
        drone.angularVel -= tiltPower;
    }

    if(touchRight && !touchLeft){
        drone.angularVel += tiltPower;
    }

    if(touchLeft && touchRight){
        thrust *= 1.3;
        drone.angularVel *= 0.8;
    }

    drone.angularVel = Math.max(-maxTilt, Math.min(maxTilt, drone.angularVel));

    drone.vx += Math.sin(drone.angle) * thrust;
    drone.vy -= Math.cos(drone.angle) * thrust;

    drone.vy += gravity;

    drone.x += drone.vx;
    drone.y += drone.vy;
    drone.angle += drone.angularVel;

    drone.vx *= friction;
    drone.vy *= friction;
    drone.angularVel *= angularFriction;
}

// ======================
// DRAW
// ======================
function draw(){

    // fondo visible SIEMPRE (debug safe)
    ctx.fillStyle = "#05070f";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // zona de juego
    ctx.fillStyle = "#0b1020";
    ctx.fillRect(gameX, gameY, gameWidth, gameHeight);

    if(!started){
        ctx.fillStyle="white";
        ctx.font="20px Arial";
        ctx.fillText("Toca la pantalla para empezar", 50, 100);
    }

    // drone SIEMPRE visible
    if(drone){
        ctx.save();
        ctx.translate(drone.x, drone.y);
        ctx.rotate(drone.angle);

        ctx.fillStyle = "#94a3b8";
        ctx.fillRect(-20,-8,40,16);

        ctx.fillStyle = "#38bdf8";
        ctx.beginPath();
        ctx.arc(-35,0,10,0,Math.PI*2);
        ctx.arc(35,0,10,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }

    // debug touch
    ctx.fillStyle = touchLeft ? "red" : "gray";
    ctx.fillRect(20,20,20,20);

    ctx.fillStyle = touchRight ? "blue" : "gray";
    ctx.fillRect(50,20,20,20);
}

// ======================
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
