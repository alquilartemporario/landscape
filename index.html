<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drone Tunnel Mobile PRO</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    touch-action:none;
}
canvas{
    display:block;
}

#fsBtn{
    position:fixed;
    top:10px;
    right:10px;
    z-index:10;
    padding:10px 14px;
    background:#ffffff22;
    color:white;
    border:1px solid white;
    border-radius:8px;
    font-family:Arial;
}
</style>
</head>

<body>

<button id="fsBtn">⛶ Full</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// 🔊 AUDIO SIMPLE (mobile safe)
function beep(freq=200, time=0.1){
    try{
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctxA = new AudioCtx();
        const o = ctxA.createOscillator();
        const g = ctxA.createGain();
        o.connect(g);
        g.connect(ctxA.destination);
        o.frequency.value = freq;
        o.start();
        g.gain.exponentialRampToValueAtTime(0.0001, ctxA.currentTime + time);
        o.stop(ctxA.currentTime + time);
    }catch(e){}
}

// STATE
let started = false;
let gameOver = false;
let score = 0;
let speedMultiplier = 1;

let drone = {};
let planet = null;

// WORLD
let gameX = 0, gameY = 0, gameWidth = 0, gameHeight = 0;

function resetBounds(){
    gameWidth = canvas.width;
    gameHeight = canvas.height;
    gameX = 0;
    gameY = 0;
}

// DRONE
function resetDrone(){
    drone = {
        x: canvas.width/2,
        y: canvas.height*0.7,
        vx: 0,
        vy: 0,
        angle: 0,
        angularVel: 0
    };
}

// PLANET
function spawnPlanet(){
    planet = {
        t: 0,
        baseSpeed: 0.004 + speedMultiplier*0.0008,
        offsetX: (Math.random()-0.5)*canvas.width*0.4,
        holeOffset: (Math.random()-0.5)*canvas.height*0.3
    };
}

// INPUT
let thrust = 0;

// tocar pantalla = acelerar
function setTouch(on){
    thrust = on ? 1 : 0;
}

document.addEventListener("touchstart", ()=> {
    if(!started){
        started = true;
        resetDrone();
        spawnPlanet();
    }
    setTouch(true);
});

document.addEventListener("touchend", ()=> setTouch(false));

// FULLSCREEN
document.getElementById("fsBtn").onclick = ()=>{
    let el = document.documentElement;
    if(el.requestFullscreen){
        el.requestFullscreen();
    }
};

// GYRO CONTROL
window.addEventListener("deviceorientation", (e)=>{
    if(!drone) return;
    let gamma = e.gamma || 0; // izquierda/derecha
    drone.angularVel = gamma * 0.0015;
});

// FALLBACK INPUT (mouse)
document.addEventListener("mousedown", ()=> setTouch(true));
document.addEventListener("mouseup", ()=> setTouch(false));

// UPDATE
function update(){

    resetBounds();

    if(!started) return;

    if(gameOver){
        resetGame();
        return;
    }

    // physics
    const gravity = 0.25;
    const thrustPower = 0.5;

    drone.vx += Math.sin(drone.angle) * thrust * thrustPower;
    drone.vy -= Math.cos(drone.angle) * thrust * thrustPower;

    drone.vy += gravity;

    drone.x += drone.vx;
    drone.y += drone.vy;
    drone.angle += drone.angularVel;

    drone.vx *= 0.99;
    drone.vy *= 0.99;

    // bounds
    if(drone.x < 0) drone.x = 0;
    if(drone.x > canvas.width) drone.x = canvas.width;

    if(drone.y > canvas.height){
        collide();
    }

    // planet
    if(planet){

        planet.t += planet.baseSpeed * (thrust ? 1.8 : 1);

        let ease = planet.t * planet.t;

        planet.radius = 40 + ease * canvas.width * 0.8;

        planet.x = canvas.width/2 + planet.offsetX * ease;
        planet.y = canvas.height/2;

        planet.holeX = planet.x;
        planet.holeY = planet.y + planet.holeOffset * ease;

        planet.hole = planet.radius * 0.25;

        if(planet.t >= 1){

            let dx = drone.x - planet.holeX;
            let dy = drone.y - planet.holeY;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist > planet.hole){
                collide();
            }else{
                score++;
                speedMultiplier += 0.05;
                beep(600,0.08);
            }

            planet = null;
            setTimeout(spawnPlanet, 200);
        }
    }
}

// COLLIDE
function collide(){
    gameOver = true;
    beep(120,0.3);
}

// RESET SAFE
function resetGame(){
    gameOver = false;
    score = 0;
    speedMultiplier = 1;
    resetDrone();
    spawnPlanet();
}

// DRAW
function draw(){

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // planet
    if(planet){
        ctx.beginPath();
        ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI*2);
        ctx.fillStyle = "green";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(planet.holeX, planet.holeY, planet.hole, 0, Math.PI*2);
        ctx.fillStyle = "black";
        ctx.fill();
    }

    // drone
    ctx.save();
    ctx.translate(drone.x, drone.y);
    ctx.rotate(drone.angle);

    ctx.fillStyle = "#aaa";
    ctx.fillRect(-20,-8,40,16);

    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(-25,0,8,0,Math.PI*2);
    ctx.arc(25,0,8,0,Math.PI*2);
    ctx.fill();

    ctx.restore();

    // UI
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Puntos: " + score, 20, 30);

    if(!started){
        ctx.fillText("Toca para empezar 🚀", canvas.width/2 - 100, canvas.height/2);
    }

    if(gameOver){
        ctx.fillText("Game Over", canvas.width/2 - 60, canvas.height/2);
    }
}

// LOOP
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
