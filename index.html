<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Drone Simulator Mobile PRO</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#0b1020;
    touch-action:none;
}

canvas{
    display:block;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    groundY = canvas.height - 70;
}
window.addEventListener("resize", resize);
resize();

// =====================
// DRONE
// =====================
const drone = {
    x: canvas.width/2,
    y: canvas.height - 150,
    vx: 0,
    vy: 0,
    width: 60,
    height: 20,
    rot: 0
};

// =====================
// CONTROLES (ZONAS FIJAS)
// =====================
let left = false;
let right = false;
let both = false;

// zonas de pantalla
function updateTouchZones(touches){
    left = false;
    right = false;
    both = false;

    let leftActive = false;
    let rightActive = false;

    for(let t of touches){
        if(t.clientX < canvas.width * 0.33){
            leftActive = true;
        }
        else if(t.clientX > canvas.width * 0.66){
            rightActive = true;
        }
        else{
            // centro no hace nada directo
        }
    }

    if(leftActive && rightActive){
        both = true;
    } else {
        left = leftActive;
        right = rightActive;
    }
}

canvas.addEventListener("touchstart", e=>{
    e.preventDefault();
    updateTouchZones(e.touches);
});

canvas.addEventListener("touchmove", e=>{
    e.preventDefault();
    updateTouchZones(e.touches);
});

canvas.addEventListener("touchend", e=>{
    e.preventDefault();
    updateTouchZones(e.touches);
});

// =====================
// FÍSICA
// =====================
let groundY = canvas.height - 70;

const gravity = 0.22;
const thrust = 0.55;
const strafe = 0.35;

const airFriction = 0.98;
const groundFriction = 0.90;

// =====================
// UPDATE
// =====================
function update(){

    // ===== THRUST =====
    if(both){
        drone.vy -= thrust * 1.6;
    } else {
        drone.vy += gravity;
    }

    // ===== MOVIMIENTO LATERAL =====
    if(left){
        drone.vx -= strafe;
    }
    if(right){
        drone.vx += strafe;
    }

    // ===== INERCIA / ESTABILIDAD =====
    drone.vx *= airFriction;
    drone.vy *= 0.995;

    // ===== POSICIÓN =====
    drone.x += drone.vx;
    drone.y += drone.vy;

    // ===== LÍMITES HORIZONTALES =====
    if(drone.x < 20){
        drone.x = 20;
        drone.vx *= -0.3;
    }
    if(drone.x > canvas.width - 20){
        drone.x = canvas.width - 20;
        drone.vx *= -0.3;
    }

    // ===== SUELO =====
    if(drone.y > groundY){
        drone.y = groundY;
        drone.vy = 0;
        drone.vx *= groundFriction;
    }

    // techo
    if(drone.y < 40){
        drone.y = 40;
        drone.vy = 0;
    }

    // ===== ROTACIÓN SUAVE =====
    drone.rot = drone.vx * 0.03;

    draw();
    requestAnimationFrame(update);
}

// =====================
// DRAW
// =====================
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // fondo
    let g = ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,"#0b1020");
    g.addColorStop(1,"#05070f");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // suelo
    ctx.fillStyle = "#111827";
    ctx.fillRect(0, groundY, canvas.width, canvas.height-groundY);

    // drone
    ctx.save();
    ctx.translate(drone.x, drone.y);
    ctx.rotate(drone.rot);

    // cuerpo
    ctx.fillStyle = "#e5e7eb";
    ctx.fillRect(-drone.width/2, -drone.height/2, drone.width, drone.height);

    // hélices
    ctx.beginPath();
    ctx.arc(-30, -15, 10, 0, Math.PI*2);
    ctx.fillStyle = left ? "#22c55e" : "#374151";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(30, -15, 10, 0, Math.PI*2);
    ctx.fillStyle = right ? "#22c55e" : "#374151";
    ctx.fill();

    // luz
    ctx.fillStyle = "#60a5fa";
    ctx.fillRect(-5, 0, 10, 4);

    ctx.restore();

    // UI
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.font = "14px Arial";
    ctx.fillText("Izq / Der = mover | Ambos = impulso", 20, 30);
}

update();
</script>

</body>
</html>
